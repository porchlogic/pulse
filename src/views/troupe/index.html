<!-- Troupe performance template showing connection/beat status, speaker calibration, and 8-track selection grid. -->
<div class="ui-stack">
    <div class="ui-connection-meta">
        <p class="ui-status ui-status--connected">connected</p>
        <div class="ui-beat-display" aria-label="current beat">0</div>
    </div>
    <section class="ui-section">
        <h2>select track</h2>
        <div class="ui-card-grid ui-card-grid--square ui-card-grid--fixed-four">
            <button type="button" class="ui-card ui-track-button" data-track="1">Track 1<span class="ui-track-presence" data-track-presence="1" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="2">Track 2<span class="ui-track-presence" data-track-presence="2" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="3">Track 3<span class="ui-track-presence" data-track-presence="3" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="4">Track 4<span class="ui-track-presence" data-track-presence="4" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="5">Track 5<span class="ui-track-presence" data-track-presence="5" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="6">Track 6<span class="ui-track-presence" data-track-presence="6" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="7">Track 7<span class="ui-track-presence" data-track-presence="7" hidden>0</span></button>
            <button type="button" class="ui-card ui-track-button" data-track="8">Track 8<span class="ui-track-presence" data-track-presence="8" hidden>0</span></button>
        </div>
    </section>
</div>
